<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Parcelas</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Simulador de Parcelas</h1>

      <label>Valor (R$)</label>
      <input type="number" id="valor" placeholder="Ex: 1000">

      <label>Parcelas</label>
      <input type="number" id="parcelas" placeholder="Ex: 12">

      <label>Juros (%)</label>
      <input type="number" id="juros" placeholder="Ex: 2.5">

      <div class="resultado">
        <p>Parcela: <span id="valorParcela">R$ 0,00</span></p>
        <p>Total: <span id="total">R$ 0,00</span></p>
        <p>Juros: <span id="totalJuros">R$ 0,00</span></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
