<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Simulador de Parcelas</title>

  <!-- IMPORTANTE -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="card">

      <h1>Simulador de Parcelas 💳</h1>

      <label>Valor (R$)</label>
      <input type="number" id="valor" placeholder="Ex: 1000">

      <div id="opcoesParcelamento" class="opcoes"></div>

      <label>Parcelas</label>
      <input type="number" id="parcelas" placeholder="Ex: 12">
      <div id="listaParcelas" class="lista-parcelas"></div>

      <p id="taxa" class="taxa">Taxa: --</p>

      <div class="resultado">
        <p>Parcela: <strong id="valorParcela">R$ 0,00</strong></p>
        <p>Total: <strong id="total">R$ 0,00</strong></p>
        <p>Juros: <strong id="totalJuros">R$ 0,00</strong></p>
      </div>

      <button id="copiar">Copiar simulação</button>
      <p id="mensagem" class="mensagem">Copiado com sucesso!</p>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
